# FIXIT SLM — Cloud Build CI/CD Pipeline
# ========================================
# [GCP PLACEHOLDER] — Fill in PROJECT_ID when GCP is configured.
#
# Triggers on push to main branch:
#   1. Builds trainer Docker image
#   2. Builds web app Docker image
#   3. Deploys web app to Cloud Run
#
# Setup:
#   gcloud builds triggers create github \
#     --repo-name=fixit-slm \
#     --repo-owner=YOUR_GITHUB_USER \
#     --branch-pattern=^main$ \
#     --build-config=gcp/cloudbuild.yaml

steps:
  # ─────────────────────────────────────────────────────────────────────────
  # Step 1: Build trainer image
  # ─────────────────────────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-trainer
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/fixit-slm/trainer:$COMMIT_SHA
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/fixit-slm/trainer:latest
      - -f
      - training/Dockerfile.trainer
      - training/
    waitFor: ["-"]  # Run immediately

  # ─────────────────────────────────────────────────────────────────────────
  # Step 2: Build inference server image (Ollama + FIXIT SLM)
  # ─────────────────────────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-inference
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/fixit-slm/inference:$COMMIT_SHA
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/fixit-slm/inference:latest
      - -f
      - training/Dockerfile.serve
      - training/
    waitFor: ["-"]

  # ─────────────────────────────────────────────────────────────────────────
  # Step 3: Build web app image
  # ─────────────────────────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-web
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/fixit-slm/web:$COMMIT_SHA
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/fixit-slm/web:latest
      - -f
      - web/Dockerfile
      - web/
    waitFor: ["-"]

  # ─────────────────────────────────────────────────────────────────────────
  # Step 4: Push all images
  # ─────────────────────────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-trainer
    args: [push, "--all-tags", "us-central1-docker.pkg.dev/$PROJECT_ID/fixit-slm/trainer"]
    waitFor: [build-trainer]

  - name: gcr.io/cloud-builders/docker
    id: push-inference
    args: [push, "--all-tags", "us-central1-docker.pkg.dev/$PROJECT_ID/fixit-slm/inference"]
    waitFor: [build-inference]

  - name: gcr.io/cloud-builders/docker
    id: push-web
    args: [push, "--all-tags", "us-central1-docker.pkg.dev/$PROJECT_ID/fixit-slm/web"]
    waitFor: [build-web]

  # ─────────────────────────────────────────────────────────────────────────
  # Step 5: Deploy inference server to Cloud Run
  # ─────────────────────────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/gcloud
    id: deploy-inference
    args:
      - run
      - deploy
      - fixit-slm-inference
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/fixit-slm/inference:$COMMIT_SHA
      - --region=us-central1
      - --memory=8Gi
      - --cpu=4
      - --port=11434
      - --min-instances=0
      - --max-instances=3
      - --concurrency=4
      - --timeout=120
      - --no-allow-unauthenticated   # Internal only — web app calls this
    waitFor: [push-inference]

  # ─────────────────────────────────────────────────────────────────────────
  # Step 6: Deploy web app to Cloud Run
  # ─────────────────────────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/gcloud
    id: deploy-web
    args:
      - run
      - deploy
      - fixit-slm-web
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/fixit-slm/web:$COMMIT_SHA
      - --region=us-central1
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --allow-unauthenticated   # Public web app
      - --set-env-vars=INFERENCE_URL=https://fixit-slm-inference-HASH-uc.a.run.app
    waitFor: [push-web, deploy-inference]

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/fixit-slm/trainer:$COMMIT_SHA
  - us-central1-docker.pkg.dev/$PROJECT_ID/fixit-slm/inference:$COMMIT_SHA
  - us-central1-docker.pkg.dev/$PROJECT_ID/fixit-slm/web:$COMMIT_SHA

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

timeout: 3600s  # 1 hour max build time
